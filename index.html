<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root">
      <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #F8F9FA; font-family: sans-serif;">
        <div style="width: 40px; height: 40px; border: 3px solid #E5E7EB; border-top-color: #000000; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 16px; color: #8E9196; font-size: 14px;">正在启动记账助手...</p>
      </div>
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var log = document.createElement('div');
        log.style.color = 'red';
        log.style.padding = '20px';
        log.style.fontSize = '12px';
        log.style.wordBreak = 'break-all';
        log.innerHTML = '<strong>JS Error:</strong> ' + msg + '<br>Line: ' + line + '<br>URL: ' + url;
        document.body.appendChild(log);
        return false;
      };
      console.log("App starting...");
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
